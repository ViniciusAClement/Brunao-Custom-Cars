spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT: chave HS256 em Base64 (32 bytes aleatórios). Em produção use variável de ambiente.
jwt.secret=6JRgEJ10zcVwi7uWFUovsyDIlSO+WaFe33UcttN/+gg=
jwt.expiration=36000000

# CORS (Vite dev: 5173). Separe várias origens por vírgula. Com credentials não use "*".
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173